services:
  mysql:
    image: mysql:8.0
    container_name: passion-fruit-mysql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-time-zone=+08:00
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-passion_fruit}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/src/config/init-data.sql:/docker-entrypoint-initdb.d/01-init-data.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: passion-fruit-server
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      TZ: Asia/Shanghai
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-passion_fruit}
      PORT: 3001
    depends_on:
      mysql:
        condition: service_healthy
    # Playwright 在容器中需要的权限
    shm_size: '2gb'
    cap_add:
      - SYS_ADMIN

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: passion-fruit-client
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-80}:80"
    environment:
      TZ: Asia/Shanghai
    depends_on:
      - server

volumes:
  mysql_data:
