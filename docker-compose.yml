services:
  mysql:
    image: mysql:8.0
    container_name: passion-fruit-mysql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-time-zone=+08:00
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-passion_fruit}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/src/config/init-data.sql:/docker-entrypoint-initdb.d/01-init-data.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: passion-fruit-server
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      TZ: Asia/Shanghai
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-passion_fruit}
      PORT: 3001
      OPENCLAW_STATE_DIR: /openclaw_data/openclaw-weixin
    volumes:
      - openclaw_data:/openclaw_data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      mysql:
        condition: service_healthy
    # Playwright 在容器中需要的权限
    shm_size: '2gb'
    cap_add:
      - SYS_ADMIN

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: passion-fruit-client
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      TZ: Asia/Shanghai
    depends_on:
      - server

  openclaw:
    # 官方镜像 ghcr.io/openclaw/openclaw:latest
    # 国内加速备选：
    # 1. ghcr.nju.edu.cn/openclaw/openclaw:latest（南京大学镜像站）
    # 2. ghcrproxy.tongjionline.org/openclaw/openclaw:latest（同济大学镜像站）
    # 3. docker.1panel.live/ghcr/openclaw/openclaw:latest（1Panel 镜像站）
    # 如果某个镜像拉取失败，请尝试其他镜像源
    image: ghcr.nju.edu.cn/openclaw/openclaw:latest
    container_name: passion-fruit-openclaw
    restart: unless-stopped
    ports:
      - "${OPENCLAW_PORT:-18789}:18789"
    environment:
      TZ: Asia/Shanghai
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-passion_fruit}
    volumes:
      - openclaw_data:/home/node/.openclaw
      - ./server/src/config:/home/node/.openclaw/db-scripts:ro
      - ./.openclaw/skills:/home/node/.openclaw/skills:ro
      - ./.openclaw/scripts/query-db.js:/usr/local/bin/query-db.js:ro
    depends_on:
      - mysql

volumes:
  mysql_data:
  openclaw_data:
